<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ALMAZHARA | Essence & Skin Care</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --oro: #c9a84c;
            --oro-brillante: #f1d58a;
            --negro-velvet: #050505;
            --marmol: #0d0b06;
            --texto: #e8e0d0;
            --borde-oro: rgba(201,168,76,0.3);
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        /* Escenario Velvet */
        body {
            margin: 0; background: var(--negro-velvet); color: var(--texto);
            font-family: 'Montserrat', sans-serif; -webkit-font-smoothing: antialiased;
            background-image: radial-gradient(circle at 50% -20%, #1a150a 0%, #050505 80%);
            padding-bottom: calc(100px + var(--safe-bottom));
        }

        /* Header de Alta Gama */
        header {
            text-align: center; padding: calc(60px + var(--safe-top)) 20px 40px;
            border-bottom: 1px solid var(--borde-oro);
        }
        .logo-img { width: 180px; filter: drop-shadow(0 0 20px rgba(201,168,76,0.15)); margin-bottom: 15px; }
        .brand-title { 
            font-family: 'Cormorant Garamond', serif; font-size: 38px; 
            letter-spacing: 12px; color: #fff; text-transform: uppercase; font-weight: 300;
        }
        .brand-legend { 
            font-size: 10px; letter-spacing: 6px; color: var(--oro); 
            text-transform: uppercase; font-weight: 400; margin-top: 10px;
        }

        /* Grid Dinámico */
        .grid {
            display: grid; grid-template-columns: 1fr; gap: 40px; padding: 40px 20px;
            max-width: 900px; margin: 0 auto;
        }
        @media (min-width: 650px) { .grid { grid-template-columns: 1fr 1fr; } }

        /* Tarjeta Estilo Podio de Mármol */
        .card {
            background: linear-gradient(145deg, #0d0b06 0%, #050505 100%);
            border: 1px solid var(--borde-oro); border-radius: 2px;
            overflow: hidden; position: relative;
            transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1);
            animation: fadeIn 0.8s ease-out forwards; opacity: 0;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .card:hover { border-color: var(--oro); transform: translateY(-5px); box-shadow: 0 15px 35px rgba(0,0,0,0.8); }

        .img-box { position: relative; width: 100%; aspect-ratio: 9/13; overflow: hidden; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.8s ease; }
        .card:hover .img-box img { transform: scale(1.05); }
        
        .badge {
            position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.7);
            border: 1px solid var(--oro); color: var(--oro); padding: 6px 14px;
            font-size: 9px; letter-spacing: 3px; text-transform: uppercase; backdrop-filter: blur(5px);
        }

        .info { padding: 30px; text-align: center; }
        .marca { font-size: 10px; color: var(--oro); letter-spacing: 4px; text-transform: uppercase; margin-bottom: 8px; font-weight: 300; }
        .nombre { 
            font-family: 'Cormorant Garamond', serif; font-size: 28px; 
            color: #fff; margin-bottom: 20px; font-weight: 400; letter-spacing: 1px;
        }

        /* Ingredientes - Rigor Ortográfico */
        .notes-container {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
            margin-bottom: 25px; border-top: 1px solid rgba(201,168,76,0.1); padding-top: 20px;
        }
        .note-box { text-align: center; }
        .n-label { font-size: 8px; color: var(--oro); text-transform: uppercase; letter-spacing: 2px; display: block; margin-bottom: 5px; }
        .n-val { font-size: 10px; color: var(--texto); font-weight: 200; }

        .price-tag {
            background: linear-gradient(to right, transparent, rgba(201,168,76,0.1), transparent);
            padding: 15px; margin-top: 10px; border-radius: 4px;
        }
        .price-val { font-size: 22px; color: var(--oro-brillante); font-weight: 600; letter-spacing: 1px; }

        /* Botón WhatsApp de Lujo */
        .wa-btn {
            position: fixed; bottom: calc(30px + var(--safe-bottom)); right: 30px;
            background: var(--oro); color: #000; width: 65px; height: 65px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6); text-decoration: none; font-size: 28px; z-index: 100;
            transition: all 0.3s ease; border: 2px solid var(--oro-brillante);
        }
        .wa-btn:hover { transform: scale(1.1); background: var(--oro-brillante); }
    </style>
</head>
<body>

<header>
    <img src="logo_almazhara.png" class="logo-img" alt="ALMAZHARA">
    <h1 class="brand-title">ALMAZHARA</h1>
    <p class="brand-legend">ESSENCE & SKIN CARE</p>
</header>

<div id="catalog" class="grid"></div>

<a href="https://wa.me/573203787206?text=Hola! Deseo adquirir una fragancia de ALMAZHARA." class="wa-btn" target="_blank">💬</a>

<script>
    const PRODUCTS = [
        { f: "avenue.png", n: "Avenue", m: "Al Rehab", p: "50.000", l: "Core", s: "Limón", c: "Pachulí", b: "Almizcle" },
        { f: "amber.png", n: "Amber", m: "Nabeel", p: "50.000", l: "Core", s: "Ámbar", c: "Maderas", b: "Especias" },
        { f: "nasaem.png", n: "Nasaem", m: "Nabeel", p: "50.000", l: "Core", s: "Aldehídos", c: "Flores", b: "Oud" },
        { f: "sabaya.png", n: "Sabaya", m: "Al Rehab", p: "55.000", l: "Core", s: "Cítricos", c: "Rosa", b: "Verde" },
        { f: "sultan.png", n: "Sultan", m: "Al Rehab", p: "50.000", l: "Core", s: "Cedro", c: "Enebro", b: "Sándalo" },
        { f: "choco-musk.png", n: "Choco Musk", m: "Al Rehab", p: "55.000", l: "Core", s: "Cacao", c: "Vainilla", b: "Almizcle" },
        { f: "layali.png", n: "Layali", m: "Swiss Arabian", p: "145.000", l: "Royalty", s: "Ciruela", c: "Ylang", b: "Ámbar" },
        { f: "hareem.png", n: "Hareem Al Sultan Gold", m: "Khadlaj", p: "160.000", l: "Royalty", s: "Manzana", c: "Jazmín", b: "Pachulí" },
        { f: "rafia.png", n: "Rafia Gold", m: "Al Haramain", p: "150.000", l: "Royalty", s: "Azafrán", c: "Cedro", b: "Vainilla" },
        { f: "mera.png", n: "Mera", m: "Hamidi", p: "140.000", l: "Royalty", s: "Naranja", c: "Flores", b: "Ámbar" },
        { f: "adwaa.png", n: "Adwaa Al Sharq", m: "Afnan", p: "160.000", l: "Royalty", s: "Especias", c: "Ámbar", b: "Maderas" },
        { f: "noora.png", n: "Noora Onyx", m: "Swiss Arabian", p: "160.000", l: "Royalty", s: "Cuero", c: "Romero", b: "Vetiver" }
    ];

    document.getElementById('catalog').innerHTML = PRODUCTS.map((p, index) => `
        <div class="card" style="animation-delay: ${index * 0.1}s">
            <div class="img-box">
                <div class="badge">${p.l}</div>
                <img src="${p.f}" alt="${p.n}" loading="lazy">
            </div>
            <div class="info">
                <span class="marca">${p.m}</span>
                <h2 class="nombre">${p.n}</h2>
                <div class="notes-container">
                    <div class="note-box"><span class="n-label">Salida</span><span class="n-val">${p.s}</span></div>
                    <div class="note-box"><span class="n-label">Corazón</span><span class="n-val">${p.c}</span></div>
                    <div class="note-box"><span class="n-label">Base</span><span class="n-val">${p.b}</span></div>
                </div>
                <div class="price-tag">
                    <span class="price-val">$${p.p} COP</span>
                </div>
            </div>
        </div>
    `).join('');
</script>
</body>
</html>
