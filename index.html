<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ALMAZHARA | Tu Huella Olfativa</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@200;300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --oro: #c9a84c;
            --oro-suave: #d4bc7d;
            --negro-profundo: #050505;
            --marmol-fondo: #0a0a0a;
            --texto: #e8e0d0;
            --borde: rgba(201,168,76,0.25);
            --safe-top: env(safe-area-inset-top);
        }

        body {
            margin: 0; background: var(--negro-profundo); color: var(--texto);
            font-family: 'Montserrat', sans-serif; -webkit-font-smoothing: antialiased;
            background-image: radial-gradient(circle at 50% 0%, #1a150a 0%, #050505 70%);
        }

        /* Branding e Introducción */
        header {
            text-align: center; padding: calc(60px + var(--safe-top)) 20px 40px;
        }
        .logo-main { width: 160px; margin-bottom: 25px; filter: drop-shadow(0 0 15px rgba(201,168,76,0.2)); }
        
        .intro-container { max-width: 600px; margin: 0 auto 50px; padding: 0 20px; }
        .intro-title { 
            font-family: 'Cormorant Garamond', serif; font-size: 28px; 
            color: #fff; font-weight: 300; font-style: italic; line-height: 1.4;
        }
        .intro-line { width: 40px; height: 1px; background: var(--oro); margin: 20px auto; }

        /* Estructura de Secciones */
        .section-header {
            text-align: center; margin: 60px 0 30px; position: relative;
        }
        .section-header h2 {
            font-family: 'Cormorant Garamond', serif; font-size: 32px;
            letter-spacing: 6px; text-transform: uppercase; color: var(--oro);
            font-weight: 400;
        }
        .section-desc {
            font-size: 10px; letter-spacing: 3px; color: #8a8070; text-transform: uppercase;
            margin-top: 5px;
        }

        .grid {
            display: grid; grid-template-columns: 1fr; gap: 40px; padding: 0 25px 60px;
            max-width: 1000px; margin: 0 auto;
        }
        @media (min-width: 700px) { .grid { grid-template-columns: 1fr 1fr; } }

        /* Tarjeta Evolucionada */
        .card {
            background: linear-gradient(180deg, #0d0b06 0%, #050505 100%);
            border: 1px solid var(--borde); border-radius: 2px;
            display: flex; flex-direction: column; overflow: hidden;
            transition: all 0.4s ease;
        }

        .img-container { position: relative; aspect-ratio: 9/12; background: #000; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; opacity: 0.9; }
        
        .tag-intensidad {
            position: absolute; bottom: 15px; left: 15px;
            font-size: 9px; letter-spacing: 1px; color: var(--oro);
            background: rgba(0,0,0,0.7); padding: 4px 10px; border: 0.5px solid var(--oro);
        }

        .info-panel { padding: 30px; text-align: center; flex-grow: 1; display: flex; flex-direction: column; }
        .marca-tag { font-size: 9px; letter-spacing: 3px; color: var(--oro); text-transform: uppercase; margin-bottom: 10px; }
        .nombre-perfume { font-family: 'Cormorant Garamond', serif; font-size: 26px; color: #fff; margin-bottom: 12px; }
        
        .descripcion-corta { font-size: 13px; font-weight: 300; line-height: 1.6; color: #b0a89a; margin-bottom: 20px; font-style: italic; }

        .caracteristicas {
            display: flex; justify-content: center; gap: 15px; margin-bottom: 25px;
            font-size: 10px; color: var(--oro-suave); text-transform: uppercase; letter-spacing: 1px;
        }
        .item-feat { border-bottom: 1px solid rgba(201,168,76,0.2); padding-bottom: 4px; }

        .notas-mini {
            display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;
            padding-top: 20px; border-top: 1px dotted rgba(201,168,76,0.2); margin-top: auto;
        }
        .n-box span { display: block; }
        .n-tit { font-size: 7px; text-transform: uppercase; color: var(--oro); margin-bottom: 4px; }
        .n-val { font-size: 9px; color: var(--texto); font-weight: 300; }

        .price-box { margin-top: 25px; font-size: 20px; color: #fff; font-weight: 600; letter-spacing: 1px; }

        .btn-wa {
            position: fixed; bottom: 30px; right: 30px; background: var(--oro);
            color: #000; width: 60px; height: 60px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-decoration: none; font-size: 26px; z-index: 100;
        }
    </style>
</head>
<body>

<header>
    <img src="logo_almazhara.png" class="logo-main" alt="ALMAZHARA">
    <div class="intro-container">
        <h1 class="intro-title">Bienvenido a tu viaje en la búsqueda de tu huella olfativa.</h1>
        <div class="intro-line"></div>
    </div>
</header>

<div class="section-header">
    <h2>Línea Iniciación</h2>
    <p class="section-desc">El primer paso en el arte del attar</p>
</div>
<div id="grid-iniciacion" class="grid"></div>

<div class="section-header">
    <h2>Línea Umbral</h2>

</div>
<div id="grid-umbral" class="grid"></div>

<div class="section-header">
    <h2>Línea Royalty</h2>
    <p class="section-desc">La máxima expresión del lujo árabe</p>
</div>
<div id="grid-royalty" class="grid"></div>

<a href="https://wa.me/573203787206?text=Hola! Quiero iniciar mi viaje olfativo con ALMAZHARA." class="btn-wa">💬</a>

<script>
    const CATALOGO = [
        // INICIACIÓN (Al Rehab)
        { f: "choco-musk.png", n: "Choco Musk", m: "Al Rehab", l: "Iniciación", p: "55.000", s: "Canela", c: "Chocolate", b: "Almizcle", o: "Relax, Noche", i: "Media", d: "Un abrazo dulce en forma de perfume." },
        { f: "sabaya.png", n: "Sabaya", m: "Al Rehab", l: "Iniciación", p: "55.000", s: "Cítricos", c: "Rosa, Jazmín", b: "Almizcle Blanco", o: "Diario, Oficina", i: "Media", d: "Frescura floral como una mañana de primavera." },
        { f: "sultan.png", n: "Sultan", m: "Al Rehab", l: "Iniciación", p: "50.000", s: "Bergamota", c: "Cedro, Sándalo", b: "Ámbar", o: "Versátil, Trabajo", i: "Media", d: "Elegancia discreta con carácter propio." },
        { f: "avenue.png", n: "Avenue", m: "Al Rehab", l: "Iniciación", p: "50.000", s: "Cítricos", c: "Oud suave", b: "Pachulí", o: "Urbano, Citas", i: "Media", d: "El ritmo de la ciudad en un frasco." },

        { f: "nasaem.png", n: "Nasaem", m: "Nabeel", l: "Umbral", p: "50.000", s: "Aldehídos", c: "Orquídea", b: "Oud, Vainilla", o: "Versátil, Elegante", i: "Media", d: "Equilibrio entre frescura y misterio." },

        // ROYALTY (Premium)
        { f: "hareem.png", n: "Hareem Al Sultan Gold", m: "Khadlaj", l: "Royalty", p: "160.000", s: "Manzana", c: "Gardenia", b: "Ámbar", o: "Gala, Eventos", i: "Fuerte", d: "La esencia de la realeza femenina." },

        { f: "layali.png", n: "Layali", m: "Swiss Arabian", l: "Royalty", p: "145.000", s: "Frutas Oscuras", c: "Orquídea", b: "Oud, Sándalo", o: "Noche, Seducción", i: "Muy Fuerte", d: "El misterio de las noches árabes." },

        { f: "adwaa.png", n: "Adwaa Al Sharq", m: "Afnan", l: "Royalty", p: "160.000", l: "Royalty", s: "Azafrán", c: "Ámbar", b: "Maderas", o: "Noche, Poder", i: "Fuerte", d: "El poder del oriente profundo." },

    ];

    function createCard(p) {
        return `

                    <img src="${p.f}" alt="${p.n}">
                    <div class="tag-intensidad">Intensidad: ${p.i}</div>
                </div>
                <div class="info-panel">
                    <span class="marca-tag">${p.m}</span>
                    <h3 class="nombre-perfume">${p.n}</h3>
                    <p class="descripcion-corta">${p.d}</p>
                    <div class="caracteristicas">

                    <div class="notas-mini">
                        <div class="n-box"><span class="n-tit">Salida</span><span class="n-val">${p.s}</span></div>

                        <div class="n-box"><span class="n-tit">Fondo</span><span class="n-val">${p.b}</span></div>

                    <div class="price-box">$${p.p} COP</div>
                </div>

    }

    const grids = {
        'Iniciación': document.getElementById('grid-iniciacion'),
        'Umbral': document.getElementById('grid-umbral'),
        'Royalty': document.getElementById('grid-royalty')

    CATALOGO.forEach(p => {
        if(grids[p.l]) grids[p.l].innerHTML += createCard(p);
    });
</script>

</body>
</html>
