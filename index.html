    <style>
        :root {
            --oro: #c9a84c;
            --oro-brillante: #f1d58a;
            --negro-velvet: #050505;
            --texto: #e8e0d0;
            --borde: rgba(201,168,76,0.25);

        body {
            margin: 0; background: var(--negro-velvet); color: var(--texto);
            font-family: 'Montserrat', sans-serif; -webkit-font-smoothing: antialiased;

        }

        header { text-align: center; padding: 80px 20px 40px; }

            font-family: 'Cormorant Garamond', serif; font-size: 42px; 
            letter-spacing: 12px; color: #fff; text-transform: uppercase; 
            font-weight: 300; margin: 0;
        }

            font-size: 10px; letter-spacing: 6px; color: var(--oro); 
            text-transform: uppercase; font-weight: 400; margin-top: 10px;
        }

        .intro-text { 
            max-width: 600px; margin: 40px auto; padding: 0 25px;
            font-family: 'Cormorant Garamond', serif; font-size: 24px; 
            font-style: italic; color: #fff; line-height: 1.4; opacity: 0.9; text-align: center;
        }

        /* SECCIÓN ORÁCULO */
        .oracle-section { text-align: center; margin: 60px auto 100px; padding: 0 20px; }
        .oracle-label { font-size: 9px; letter-spacing: 4px; color: var(--oro); text-transform: uppercase; margin-bottom: 25px; display: block; }
        .oracle-btn {
            display: inline-block; padding: 18px 45px; border: 1px solid var(--oro);
            color: var(--oro); text-decoration: none; font-size: 13px;
            letter-spacing: 5px; transition: all 0.6s ease;
            background: rgba(201, 168, 76, 0.02);
        }
        .oracle-btn:hover { background: var(--oro); color: #000; box-shadow: 0 0 30px rgba(201, 168, 76, 0.4); transform: translateY(-3px); }

        /* Catálogo */
        .section-title { text-align: center; margin: 80px 0 40px; }
        .section-title h2 { font-family: 'Cormorant Garamond', serif; font-size: 32px; letter-spacing: 6px; text-transform: uppercase; color: var(--oro); font-weight: 300; }

        .grid { display: grid; grid-template-columns: 1fr; gap: 40px; padding: 0 25px; max-width: 1100px; margin: 0 auto; }
        @media (min-width: 768px) { .grid { grid-template-columns: 1fr 1fr; } }

        .card { background: linear-gradient(180deg, #0d0b06 0%, #050505 100%); border: 1px solid var(--borde); position: relative; transition: 0.5s ease; overflow: hidden; }
        .card:hover { border-color: var(--oro); }

        .img-wrap { aspect-ratio: 9/12; overflow: hidden; position: relative; }
        .img-wrap img { width: 100%; height: 100%; object-fit: cover; opacity: 0.85; transition: 0.8s; }
        .card:hover .img-wrap img { opacity: 1; transform: scale(1.05); }
        
        .intensity-tag { position: absolute; top: 15px; right: 15px; font-size: 8px; letter-spacing: 2px; color: var(--oro); background: rgba(0,0,0,0.8); padding: 4px 10px; border: 1px solid var(--oro); }

        .info { padding: 30px; text-align: center; }
        .p-brand { font-size: 9px; letter-spacing: 3px; color: var(--oro); text-transform: uppercase; margin-bottom: 10px; }
        .p-name { font-family: 'Cormorant Garamond', serif; font-size: 26px; color: #fff; margin-bottom: 12px; }
        .p-desc { font-size: 13px; color: #b0a89a; font-style: italic; line-height: 1.5; margin-bottom: 20px; }

        .pyramid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; border-top: 1px solid rgba(201,168,76,0.15); padding-top: 20px; }
        .pyr-label { font-size: 7px; text-transform: uppercase; color: var(--oro); margin-bottom: 4px; }
        .pyr-val { font-size: 9px; font-weight: 300; line-height: 1.2; }

        .price { margin-top: 25px; font-size: 20px; color: #fff; font-weight: 500; letter-spacing: 1px; }

        .wa-float { position: fixed; bottom: 30px; right: 30px; background: var(--oro); color: #000; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-decoration: none; font-size: 26px; z-index: 1000; }
    </style>
</head>
